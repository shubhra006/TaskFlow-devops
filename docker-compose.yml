version: '3.8'

services:

  # ── MySQL database ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: taskflow
    volumes:
      - mysql_data:/var/lib/mysql    # Data survives container restarts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRoot@123"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── Flask backend ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      MYSQL_HOST:     db
      MYSQL_USER:     root
      MYSQL_PASSWORD: Root@123
      MYSQL_DB:       taskflow
    depends_on:
      db:
        condition: service_healthy  # Wait for MySQL healthcheck to pass

  # ── Nginx: serves frontend + proxies API ───────────────
  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"                     # Only port exposed to the internet
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data: