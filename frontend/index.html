<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 30px; }
    .container {
      max-width: 700px; margin: auto;
      background: white; padding: 30px;
      border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { font-size: 28px; margin-bottom: 20px; color: #1a1a2e; }
    .add-row { display: flex; gap: 10px; margin-bottom: 24px; }
    input {
      flex: 1; padding: 10px 14px; font-size: 15px;
      border: 1.5px solid #d1d5db; border-radius: 7px; outline: none;
    }
    input:focus { border-color: #1d4ed8; }
    .btn {
      padding: 10px 20px; font-size: 15px; font-weight: 600;
      border: none; border-radius: 7px; cursor: pointer;
    }
    .btn-add { background: #1d4ed8; color: white; }
    .btn-add:hover { background: #1e40af; }
    .btn-del { background: #fee2e2; color: #b91c1c; font-size: 13px; padding: 6px 12px; }
    .btn-del:hover { background: #fecaca; }
    .task-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #f9fafb;
      border: 1px solid #e5e7eb; border-radius: 7px; margin-bottom: 8px;
    }
    .task-title { font-size: 15px; color: #1f2937; }
    #status { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ TaskFlow</h1>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Type a new task..." />
      <button class="btn btn-add" onclick="addTask()">Add Task</button>
    </div>
    <div id="status">Loading...</div>
    <div id="taskList"></div>
  </div>

  <script>
    const API = '/api';

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        if (!res.ok) throw new Error('Server error');
        const tasks = await res.json();
        document.getElementById('status').textContent =
          tasks.length === 0 ? 'No tasks yet. Add one above!' : `${tasks.length} task(s)`;
        document.getElementById('taskList').innerHTML = tasks.map(t => `
          <div class="task-item">
            <span class="task-title">${t.title}</span>
            <button class="btn btn-del" onclick="deleteTask(${t.id})">Delete</button>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('status').textContent = 'Could not load tasks — is the backend running?';
      }
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      await fetch(`${API}/tasks`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    // Allow pressing Enter to add a task
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('taskInput')
        .addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });
      loadTasks();
    });
  </script>
</body>
</html>
