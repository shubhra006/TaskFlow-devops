apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels: { app: mysql }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef: { name: taskflow-secret, key: MYSQL_PASSWORD }
        - name: MYSQL_DATABASE
          value: taskflow
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost", "-pRoot@123"]
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
      - name: backend
        image: taskflow-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef: { name: taskflow-config }
        - secretRef:    { name: taskflow-secret }
        readinessProbe:
          httpGet: { path: /health, port: 5000 }
          initialDelaySeconds: 20
          periodSeconds: 10