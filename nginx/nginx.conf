server {
    listen 80;
    server_name _;

    # Serve the frontend HTML from this folder
    root /usr/share/nginx/html;
    index index.html;

    # All paths that are not /api/ → serve the HTML file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/tasks → forward to Flask as /tasks
    # The trailing slash on proxy_pass strips the /api prefix automatically
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint — passes through to Flask
    location = /health {
        proxy_pass http://backend:5000/health;
    }
}